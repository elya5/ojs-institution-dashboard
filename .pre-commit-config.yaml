repos:
- repo: https://github.com/astral-sh/ruff-pre-commit
  # Ruff version.
  rev: v0.15.11
  hooks:
    # Run the linter.
    - id: ruff-check
    # Run the formatter.
    - id: ruff-format
      args: [ --check ]

- repo: local
  hooks:
    - id: ty
      name: ty check
      entry: uvx ty check
      language: system
      types: [python]
